<svg width="280" height="120" viewBox="0 0 280 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- Isometric wooden prism (hranol) lying on its long side -->
  <defs>
    <linearGradient id="woodTop" x1="40" y1="20" x2="220" y2="70" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8C48A"/>
      <stop offset="0.5" stop-color="#D4A86A"/>
      <stop offset="1" stop-color="#C49252"/>
    </linearGradient>
    <linearGradient id="woodFront" x1="50" y1="60" x2="200" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B07A3E"/>
      <stop offset="1" stop-color="#8F5F2E"/>
    </linearGradient>
    <linearGradient id="woodEnd" x1="200" y1="30" x2="250" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A06C35"/>
      <stop offset="1" stop-color="#7A4F24"/>
    </linearGradient>
  </defs>

  <!-- Top face -->
  <path d="M30 48 L200 22 L245 48 L75 74 Z" fill="url(#woodTop)" stroke="#5C3A18" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Front long face -->
  <path d="M30 48 L75 74 L75 98 L30 72 Z" fill="url(#woodFront)" stroke="#5C3A18" stroke-width="2.2" stroke-linejoin="round"/>
  <path d="M75 74 L245 48 L245 72 L75 98 Z" fill="url(#woodFront)" stroke="#5C3A18" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Right end face -->
  <path d="M200 22 L245 48 L245 72 L200 46 Z" fill="url(#woodEnd)" stroke="#5C3A18" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- Wood grain on top -->
  <g opacity="0.28" stroke="#8B5A2B" stroke-width="1.3" stroke-linecap="round" fill="none">
    <path d="M50 50 C90 42 140 36 185 30"/>
    <path d="M58 58 C100 50 148 44 195 38"/>
    <path d="M66 66 C110 58 156 52 205 46"/>
  </g>
  <!-- End-grain arcs on right face -->
  <g opacity="0.35" stroke="#6B4018" stroke-width="1.2" fill="none">
    <ellipse cx="222.5" cy="47" rx="10" ry="14" transform="rotate(-18 222.5 47)"/>
    <ellipse cx="222.5" cy="47" rx="5" ry="8" transform="rotate(-18 222.5 47)"/>
  </g>
</svg>
