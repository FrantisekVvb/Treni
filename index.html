<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tření</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="scene" aria-label="Simulace tření">
    <header class="scene-header">
      <div class="scene-header-row">
        <h1>Tření</h1>
        <div class="scene-header-actions">
          <div class="surface-btn-group" role="group" aria-label="Povrch podložky">
            <button type="button" class="scene-btn" data-surface-type="metal" aria-pressed="true">
              Kov
            </button>
            <button type="button" class="scene-btn" data-surface-type="leather" aria-pressed="false">
              Kůže
            </button>
            <button type="button" class="scene-btn" data-surface-type="carpet" aria-pressed="false">
              Koberec
            </button>
            <button type="button" class="scene-btn" data-surface-type="wood" aria-pressed="false">
              Dřevo
            </button>
            <button type="button" class="scene-btn" data-surface-type="ice" aria-pressed="false">
              Led
            </button>
          </div>
          <div class="beam-btn-group" role="group" aria-label="Výběr hranolu">
            <button type="button" class="scene-btn" data-beam-type="wood" aria-pressed="true">
              Dřevěný hranol
            </button>
            <button type="button" class="scene-btn" data-beam-type="wood2kg" aria-pressed="false">
              Dřevěný hranol 2 kg
            </button>
            <button type="button" class="scene-btn" data-beam-type="woodSmall" aria-pressed="false">
              Malý dřevěný hranol
            </button>
            <button type="button" class="scene-btn" data-beam-type="steel" aria-pressed="false">
              Ocelový hranol
            </button>
            <button type="button" class="scene-btn" data-beam-type="steelSmall" aria-pressed="false">
              Malý ocelový hranol
            </button>
          </div>
          <button type="button" class="scene-btn" id="flipBeamBtn" aria-pressed="false">
            Na boční hranu
          </button>
          <button type="button" class="scene-btn" id="resetBtn">Reset</button>
        </div>
      </div>
      <p class="scene-meta" id="beamMassEl">Hmotnost: 0,6 kg · Objem: 1&nbsp;000 cm³</p>
    </header>

    <div class="stage" id="stage" aria-label="Kovová podložka s dřevěným hranolem">
      <div class="pad-wrap" id="padWrap"></div>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
