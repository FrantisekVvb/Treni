<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  />
  <title>Tření</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="scene" aria-label="Simulace tření">
    <aside class="setup-panel" aria-label="Nastavení simulace">
      <div class="panel-copy">
        <h1 class="panel-title">Tření</h1>
      </div>

      <div class="panel-section">
        <span class="panel-label">Povrch podložky</span>
        <div class="panel-btn-grid" role="group" aria-label="Povrch podložky">
          <button type="button" class="scene-btn" data-surface-type="metal" aria-pressed="true">
            kov
          </button>
          <button type="button" class="scene-btn" data-surface-type="leather" aria-pressed="false">
            kůže
          </button>
          <button type="button" class="scene-btn" data-surface-type="carpet" aria-pressed="false">
            koberec
          </button>
          <button type="button" class="scene-btn" data-surface-type="wood" aria-pressed="false">
            dřevo
          </button>
          <button type="button" class="scene-btn" data-surface-type="ice" aria-pressed="false">
            led
          </button>
          <button type="button" class="scene-btn" data-surface-type="rubber" aria-pressed="false">
            guma
          </button>
        </div>
      </div>

      <div class="panel-section">
        <span class="panel-label">Hranol</span>

        <div class="beam-picker">
          <div class="beam-picker__block">
            <p class="beam-picker__title">dřevěný hranol</p>
            <div class="panel-btn-grid panel-btn-grid--sizes-3" role="group" aria-label="Velikost dřevěného hranolu">
              <button type="button" class="scene-btn scene-btn--size" data-beam-type="woodSmall" aria-pressed="false">
                malý
              </button>
              <button type="button" class="scene-btn scene-btn--size" data-beam-type="wood" aria-pressed="true">
                střední
              </button>
              <button type="button" class="scene-btn scene-btn--size" data-beam-type="wood2kg" aria-pressed="false">
                velký
              </button>
            </div>
          </div>

          <div class="beam-picker__block">
            <p class="beam-picker__title">ocelový hranol</p>
            <div class="panel-btn-grid panel-btn-grid--sizes-2" role="group" aria-label="Velikost ocelového hranolu">
              <button type="button" class="scene-btn scene-btn--size" data-beam-type="steelSmall" aria-pressed="false">
                malý
              </button>
              <button type="button" class="scene-btn scene-btn--size" data-beam-type="steel" aria-pressed="false">
                velký
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="panel-section">
        <button
          type="button"
          class="scene-btn scene-btn--block"
          id="muEditorToggleBtn"
          aria-pressed="false"
          aria-expanded="false"
          aria-controls="muEditor"
        >
          koeficient smykového tření
        </button>

        <div class="mu-editor" id="muEditor" hidden>
          <p class="mu-editor__pair" id="muPairLabel">dřevo – kov</p>
          <div class="mu-editor__row">
            <span class="mu-editor__label"><em>f</em> =</span>
            <span class="mu-editor__field">
              <input
                type="text"
                class="mu-editor__input"
                id="muInput"
                inputmode="decimal"
                autocomplete="off"
                aria-label="koeficient smykového tření"
              />
            </span>
            <button type="button" class="scene-btn mu-editor__ok" id="muOkBtn">OK</button>
          </div>
          <span class="mu-editor__feedback" id="muFeedback" hidden></span>

          <div class="math-keypad" id="mathKeypad" aria-label="Matematická klávesnice">
            <button type="button" class="math-keypad__key" data-key="7">7</button>
            <button type="button" class="math-keypad__key" data-key="8">8</button>
            <button type="button" class="math-keypad__key" data-key="9">9</button>
            <button type="button" class="math-keypad__key" data-key="4">4</button>
            <button type="button" class="math-keypad__key" data-key="5">5</button>
            <button type="button" class="math-keypad__key" data-key="6">6</button>
            <button type="button" class="math-keypad__key" data-key="1">1</button>
            <button type="button" class="math-keypad__key" data-key="2">2</button>
            <button type="button" class="math-keypad__key" data-key="3">3</button>
            <button type="button" class="math-keypad__key" data-key=",">,</button>
            <button type="button" class="math-keypad__key" data-key="0">0</button>
            <button
              type="button"
              class="math-keypad__key math-keypad__key--action"
              data-key="backspace"
              aria-label="Smazat"
            >
              ⌫
            </button>
          </div>
        </div>
      </div>
    </aside>

    <div class="scene-workspace" id="stage" aria-label="Kovová podložka s dřevěným hranolem">
      <div class="scene-stage">
        <div class="pad-wrap" id="padWrap"></div>
        <div class="scene-meta" id="beamMassEl">
          <p class="scene-meta__line">tíha = 6 N</p>
          <p class="scene-meta__line">objem = 1&nbsp;000 cm³</p>
          <p class="scene-meta__line">velikost třecí plochy = 191&nbsp;cm²</p>
        </div>
        <div class="scene-actions">
          <button type="button" class="scene-btn scene-btn--reset" id="resetBtn">vrátit na původní pozici</button>
          <button type="button" class="scene-btn scene-btn--flip" id="flipBeamBtn" aria-pressed="false">
            otočit hranol
          </button>
        </div>
      </div>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
